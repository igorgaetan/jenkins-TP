<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mon App Jenkins</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .card {
      text-align: center;
      background: #16213e;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    h1 { color: #0f3460; font-size: 2.5rem; }
    p  { color: #a0a0b0; }
    .badge {
      display: inline-block;
      background: #e94560;
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 Déployé avec Jenkins</h1>
    <p>Pipeline CI/CD opérationnelle</p>
    <span class="badge">Version 2.0</span>
  </div>
</body>
</html>
